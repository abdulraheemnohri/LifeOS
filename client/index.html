<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Sync Enterprise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-spinner" class="spinner-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <div id="app-container">
        <!-- Step 1: Mode Selection -->
        <div id="mode-view" class="glass-card login-card">
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <span>LifeOS<span>Sync</span></span>
            </div>
            <h2>Get Started</h2>
            <p>Choose how you want to use LifeOS</p>
            <button onclick="showServerView()">Connect to Cloud (Backup & Sync)</button>
            <button onclick="useLocally()" class="btn-secondary">Work Locally (Offline Only)</button>
        </div>

        <!-- Step 2: Server Connection -->
        <div id="server-view" class="glass-card login-card" style="display:none;">
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <span>LifeOS<span>Sync</span></span>
            </div>
            <h2>Connect to Server</h2>
            <p>Enter your enterprise server address to begin.</p>
            <input type="text" id="server-ip" placeholder="https://your-server.com">
            <button onclick="connectServer()">Connect</button>
            <button onclick="showModeView()" class="btn-secondary">Back</button>
        </div>

        <!-- Step 3: Login View (Cloud or Local) -->
        <div id="login-view" class="glass-card login-card" style="display:none;">
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <span>LifeOS<span>Sync</span></span>
            </div>
            <h2 id="login-title">Welcome Back</h2>
            <p id="login-desc">Login to your account</p>

            <div id="cloud-login-fields">
                <input type="text" id="username" placeholder="Username">
            </div>
            <input type="password" id="password" placeholder="Password">

            <label class="checkbox-container">
                <input type="checkbox" id="remember-me" checked> Remember Me
            </label>
            <button onclick="handleLogin()" id="login-btn">Login</button>
            <button onclick="showModeView()" class="btn-secondary">Change Mode</button>
        </div>

        <!-- Dashboard View (Initially Hidden) -->
        <div id="main-view" style="display:none;">
            <div id="fab-container">
                <button id="fab-main" onclick="toggleFab()">+</button>
                <div id="fab-menu" style="display:none;">
                    <button onclick="showSection('income'); setTimeout(()=>IncomeComponent.add(),100); toggleFab()">💰 Income</button>
                    <button onclick="showSection('bills'); setTimeout(()=>BillsComponent.add(),100); toggleFab()">🧾 Bill</button>
                    <button onclick="showSection('notes'); setTimeout(()=>NotesComponent.add(),100); toggleFab()">📝 Note</button>
                    <button onclick="showSection('tasks'); setTimeout(()=>TasksComponent.add(),100); toggleFab()">✅ Task</button>
                    <button onclick="showSection('groceries'); setTimeout(()=>GroceryComponent.add(),100); toggleFab()">🛒 Grocery</button>
                </div>
            </div>

            <nav class="glass-nav desktop-nav">
                <div class="logo-small">🚀 LifeOS</div>
                <div class="nav-links">
                    <a href="#" class="nav-link" id="desk-nav-dashboard" onclick="showSection('dashboard')">📊 Dashboard</a>
                    <a href="#" class="nav-link" id="desk-nav-income" onclick="showSection('income')">💰 Income</a>
                    <a href="#" class="nav-link" id="desk-nav-bills" onclick="showSection('bills')">🧾 Bills</a>
                    <a href="#" class="nav-link" id="desk-nav-tasks" onclick="showSection('tasks')">✅ Tasks</a>
                    <a href="#" class="nav-link" id="desk-nav-notes" onclick="showSection('notes')">📝 Notes</a>
                    <a href="#" class="nav-link" id="desk-nav-habits" onclick="showSection('habits')">🔥 Habits</a>
                </div>
                <div class="nav-spacer"></div>
                <div class="nav-actions">
                    <button class="btn-icon" onclick="toggleMoreMenuDesktop()" title="More Modules">➕</button>
                    <button class="btn-icon" onclick="showSection('profile')" title="Profile">👤</button>
                    <button class="btn-icon" onclick="showSection('settings')" title="Settings">⚙️</button>
                    <button class="btn-icon danger" onclick="logout()" title="Logout">🚪</button>
                </div>
            </nav>

            <div id="content-area">
                <!-- Sections will be rendered here -->
            </div>

            <!-- Mobile Bottom Menu -->
            <nav class="mobile-bottom-nav">
                <button onclick="showSection('dashboard')" id="nav-dashboard">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Home</span>
                </button>
                <button onclick="showSection('wifi')" id="nav-wifi">
                    <svg viewBox="0 0 24 24"><path d="M12.01 21.49L23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l11.63 14.49.01.01.01-.01z"/></svg>
                    <span>WiFi</span>
                </button>
                <button onclick="showSection('income')" id="nav-income">
                    <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                    <span>Finance</span>
                </button>
                <button onclick="showSection('notes')" id="nav-notes">
                    <svg viewBox="0 0 24 24"><path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/></svg>
                    <span>Notes</span>
                </button>
                <button onclick="toggleMoreMenu()" id="nav-more">
                    <svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    <span>More</span>
                </button>
            </nav>

            <!-- More Menu Overlay -->
            <div id="more-menu" class="more-menu-overlay" style="display:none;" onclick="toggleMoreMenu()">
                <div class="more-menu-content glass-card" onclick="event.stopPropagation()">
                    <h3>More Options</h3>
                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button onclick="showSection('bills'); toggleMoreMenu()">🧾 Bills</button>
                        <button onclick="showSection('loans'); toggleMoreMenu()">🤝 Loans</button>
                    <button onclick="showSection('habits'); toggleMoreMenu()">🔥 Habits</button>
                    <button onclick="showSection('groceries'); toggleMoreMenu()">🛒 Grocery</button>
                    <button onclick="showSection('utilities'); toggleMoreMenu()">🔌 Utility</button>
                    <button onclick="showSection('secrets'); toggleMoreMenu()">🔐 Secrets</button>
                        <button onclick="showSection('experience'); toggleMoreMenu()">📘 Timeline</button>
                        <button onclick="showSection('profile'); toggleMoreMenu()">👤 Profile</button>
                        <button onclick="showSection('settings'); toggleMoreMenu()">⚙️ Settings</button>
                        <button onclick="logout()" style="background:var(--danger)">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Update Notification Modal -->
    <div id="update-modal" class="modal" style="display:none;">
        <div class="modal-content glass-card">
            <h2>New Version Available!</h2>
            <p id="update-version"></p>
            <p id="update-message"></p>
            <button id="update-btn">Update Now</button>
            <button onclick="closeUpdateModal()">Later</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="storage.js"></script>
    <script src="api.js"></script>
    <script src="sync.js"></script>
    <script src="components/dashboard.js"></script>
    <script src="components/income.js"></script>
    <script src="components/bills.js"></script>
    <script src="components/loans.js"></script>
    <script src="components/notes.js"></script>
    <script src="components/experience.js"></script>
    <script src="components/tasks.js"></script>
    <script src="components/profile.js"></script>
    <script src="components/settings.js"></script>
    <script src="components/wifi.js"></script>
    <script src="components/groceries.js"></script>
    <script src="components/utilities.js"></script>
    <script src="components/habits.js"></script>
    <script src="components/secrets.js"></script>
    <script src="app.js"></script>
</body>
</html>
